name: Himatalk Account Creator

on:
  workflow_dispatch:           # 手動実行も可能

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Create accounts
        env:
          HIMATALK_APP_KEY: ${{ secrets.HIMATALK_APP_KEY }}
          HIMATALK_APP_SECRET: ${{ secrets.HIMATALK_APP_SECRET }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: root
        run: python create_for_actions.py
